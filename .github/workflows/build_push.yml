name: CI Dynamic Extension Build

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  detect-and-build:
    name: Detect and Build Changed Extensions
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Memerlukan 2 commit terakhir untuk mendeteksi perbedaan (git diff)
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Detect Changes and Build
        run: |
          # 1. Mengambil daftar berkas yang berubah pada commit terakhir
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          
          # 2. Mencari folder modul unik di bawah src/ (contoh: src/id/shinigami atau src/en/vyvymanga)
          # Menggunakan 'awk' untuk mengambil path sampai kedalaman bahasa/nama_ekstensi
          CHANGED_MODULES=$(echo "$CHANGED_FILES" | grep '^src/' | awk -F/ '{print ":"$1":"$2":"$3":assembleDebug"}' | sort -u)
          
          if [ -z "$CHANGED_MODULES" ]; then
            echo "Tidak ada perubahan kode di folder ekstensi (src/)."
            exit 0
          fi
          
          # 3. Menjalankan build untuk setiap modul yang terdeteksi secara berurutan
          echo "Modul yang terdeteksi berubah:"
          echo "$CHANGED_MODULES"
          echo "----------------------------------------"
          
          for TASK in $CHANGED_MODULES; do
            echo "Memulai build untuk tugas: $TASK"
            ./gradlew $TASK -x spotlessCheck
          done

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "changed-extensions-apks"
          path: "**/build/outputs/apk/**/*.apk"
          retention-days: 1
