name: CI Single Build Vyvymanga
 
on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!**.md'
      - '!.github/**'
      - '.github/scripts/**'
      - '.github/workflows/build_push.yml'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Vyvymanga Extension
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Build Vyvymanga (Debug Mode)
        run: |
          # Mematikan pengecekan format kode (-x spotlessCheck) 
          # dan menggunakan mode debug agar tidak perlu Setup Signing Key rahasia
          ./gradlew :src:en:vyvymanga:assembleDebug -x spotlessCheck

      - name: Upload APK Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "vyvymanga-apk"
          path: "**/build/outputs/apk/**/*.apk"
          retention-days: 1
          
